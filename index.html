<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>團隊週報與月會系統</title>
    <style>
        :root { --primary: #2563eb; --bg: #f3f4f6; --white: #ffffff; --text: #1f2937; --success: #10b981; --warning: #f59e0b; --gray: #9ca3af; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1280px; margin: 0 auto; }
        #login-screen { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        #app-screen { display: none; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 15px 20px; border-radius: 10px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
        .nav-btn { background: transparent; border: none; font-size: 18px; font-weight: bold; padding: 10px 20px; cursor: pointer; color: #6b7280; border-radius: 8px; }
        .nav-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: grid; grid-template-columns: 1fr 2.5fr; gap: 20px; }
        #monthly-tab.active { display: block; max-width: 900px; margin: 0 auto; }
        .card { background: var(--white); padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 5px; box-sizing: border-box; }
        button { border: none; padding: 10px 16px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        #submitBtn { background: var(--primary); color: white; width: 100%; }
        .status-tag { padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .status-done { background: #dcfce7; color: #166534; }
        .status-todo { background: #fee2e2; color: #991b1b; }
        .text-wrap { white-space: pre-wrap; word-break: break-all; }
        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="loadingOverlay">⏳ 處理中...</div>

<div id="login-screen">
    <h1>📝 週報與月會系統</h1>
    <select id="loginName" style="margin-bottom: 10px;">
        <option value="Eddy">Eddy</option><option value="Shaders">Shaders</option>
        <option value="Yang">Yang</option><option value="Nico">Nico</option>
        <option value="Yueh">Yueh</option><option value="Lidia">Lidia</option>
        <option value="Admin">Admin (管理員)</option>
    </select>
    <input type="password" id="loginPassword" placeholder="密碼" style="margin-bottom: 10px;">
    <button onclick="login()" style="background: #2563eb; color: white; width: 100%;">登入系統</button>
</div>

<div class="container" id="app-screen">
    <div class="header-bar">
        <div class="user-info">👤 <span id="displayUserName"></span> (<span id="displayUserRole"></span>)</div>
        <button onclick="logout()" style="background: #fee2e2; color: #991b1b;">登出</button>
    </div>

    <div class="nav-tabs">
        <button class="nav-btn active" id="btn-weekly" onclick="switchTab('weekly')">📝 個人週報</button>
        <button class="nav-btn" id="btn-monthly-tab" onclick="switchTab('monthly')" style="display: none;">📅 月會資料彙整</button>
    </div>

    <div id="weekly-tab" class="tab-content active">
        <div class="card">
            <h2 id="formTitle">✍️ 填寫週報</h2>
            <form id="logForm">
                <input type="hidden" id="editId">
                <div class="form-group"><label>週次</label><input type="week" id="reportWeek" required onchange="calcMonth()"></div>
                <input type="hidden" id="reportMonth">
                <div class="form-group"><label>填寫人員</label><input type="text" id="reporter" readonly style="background: #f3f4f6;"></div>
                <div class="form-group"><label>類型</label><select id="category"><option>專案開發</option><option>會議討論</option><option>客戶拜訪</option><option>行政庶務</option></select></div>
                <div class="form-group"><label>狀態</label><select id="status"><option value="已完成">✅ 已完成</option><option value="未完成">⏳ 未完成</option></select></div>
                <div class="form-group"><label>工作內容</label><textarea id="content" rows="4" required></textarea></div>
                <div class="form-group"><label>對象/備註</label><input type="text" id="target"></div>
                <button type="submit" id="submitBtn">💾 儲存週報至雲端</button>
                <button type="button" id="cancelBtn" onclick="cancelEdit()" style="display:none; background:#6b7280; color:white; width:100%; margin-top:5px;">取消修改</button>
            </form>
        </div>

        <div class="card">
            <h2>📊 紀錄列表</h2>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button onclick="setFilter('thisMonth')" id="btn-thisMonth">本月</button>
                <button onclick="setFilter('all')" id="btn-all">全部</button>
            </div>
            <table style="width:100%; border-collapse: collapse;">
                <thead><tr style="background: #f9fafb;"><th>週次/人員</th><th>狀態</th><th>內容</th><th>操作</th></tr></thead>
                <tbody id="logTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="monthly-tab" class="tab-content">
        <div class="card">
            <h2>🚀 月會資料產生器</h2>
            <div class="form-group"><label>選擇結算月份</label><input type="month" id="monthlyBaseMonth"></div>
            <button onclick="generateMonthlyReport()" style="background:#7c3aed; color:white; width:100%;">⚡ 生成月會草稿</button>
            <textarea id="monthlyOutput" style="width:100%; height:350px; margin-top:15px; font-family:monospace;"></textarea>
            <button onclick="copyMonthlyReport()" style="background:#10b981; color:white; width:100%; margin-top:10px;">📋 複製內容</button>
        </div>
    </div>
</div>

<script>
    // ⚠️ 請記得替換為您最新的 GAS 網址
    const API_URL = "https://script.google.com/macros/library/d/1CeWmJCGseXV6_nB68FXbs6u-vJJQ-smIU047LiCAQEtIkd_2aimBTcQM/2";

    let currentUser = { name: "", role: "" };
    let cloudLogs = [];
    let currentFilter = 'all';

    function showLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }

    async function callAPI(action, params) {
        showLoading(true);
        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, ...params }) });
            const data = await res.json();
            showLoading(false);
            return data;
        } catch (e) { showLoading(false); alert("連線失敗！"); return { success: false }; }
    }

    function calcMonth() {
        const val = document.getElementById('reportWeek').value;
        if(!val) return;
        const [y, w] = val.split('-W');
        const d = new Date(y, 0, 1 + (w - 1) * 7);
        d.setDate(d.getDate() + (4 - (d.getDay() || 7)));
        document.getElementById('reportMonth').value = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0');
    }

    async function login() {
        const res = await callAPI('login', { name: document.getElementById('loginName').value, password: document.getElementById('loginPassword').value });
        if (res.success) {
            currentUser = { name: document.getElementById('loginName').value, role: res.role };
            document.getElementById('displayUserName').innerText = currentUser.name;
            document.getElementById('displayUserRole').innerText = res.role;
            document.getElementById('reporter').value = currentUser.name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            if (res.role === 'Admin') document.getElementById('btn-monthly-tab').style.display = 'block';
            loadLogs();
        } else alert(res.message);
    }

    async function loadLogs() {
        const res = await callAPI('getLogs', { name: currentUser.name, role: currentUser.role });
        if (res.success) { cloudLogs = res.data; renderLogs(); }
    }

    function renderLogs() {
        const tbody = document.getElementById('logTableBody');
        tbody.innerHTML = '';
        const nowMonth = new Date().getFullYear() + "-" + String(new Date().getMonth()+1).padStart(2,'0');
        const filtered = cloudLogs.filter(l => currentFilter === 'all' || l.reportMonth === nowMonth);
        
        filtered.sort((a,b) => b.reportWeek.localeCompare(a.reportWeek)).forEach(log => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="padding:10px; border-bottom:1px solid #eee;">${log.reportWeek}<br><small>${log.reporter}</small></td>
                <td><span class="status-tag ${log.status === '已完成' ? 'status-done' : 'status-todo'}">${log.status}</span></td>
                <td class="text-wrap">${log.content}</td>
                <td>
                    <button onclick="editLog('${log.id}')" style="background:#f59e0b; color:white; padding:4px 8px;">改</button>
                    <button onclick="deleteLog('${log.id}')" style="background:#ef4444; color:white; padding:4px 8px;">刪</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    document.getElementById('logForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        calcMonth();
        const logData = {
            id: document.getElementById('editId').value,
            reportWeek: document.getElementById('reportWeek').value,
            reportMonth: document.getElementById('reportMonth').value,
            reporter: document.getElementById('reporter').value,
            category: document.getElementById('category').value,
            status: document.getElementById('status').value,
            content: document.getElementById('content').value,
            target: document.getElementById('target').value,
            note: ""
        };
        const res = await callAPI('saveLog', { logData });
        if (res.success) { cancelEdit(); loadLogs(); }
    });

    function editLog(id) {
        const log = cloudLogs.find(l => l.id.toString() === id.toString());
        if(!log) return;
        document.getElementById('editId').value = log.id;
        document.getElementById('reportWeek').value = log.reportWeek;
        document.getElementById('category').value = log.category;
        document.getElementById('status').value = log.status;
        document.getElementById('content').value = log.content;
        document.getElementById('target').value = log.target;
        document.getElementById('submitBtn').innerText = "🔄 更新週報";
        document.getElementById('cancelBtn').style.display = "block";
    }

    function cancelEdit() {
        document.getElementById('logForm').reset();
        document.getElementById('editId').value = "";
        document.getElementById('submitBtn').innerText = "💾 儲存週報至雲端";
        document.getElementById('cancelBtn').style.display = "none";
        document.getElementById('reporter').value = currentUser.name;
    }

    async function deleteLog(id) {
        if(confirm('確定刪除？')) {
            const res = await callAPI('deleteLog', { id });
            if (res.success) loadLogs();
        }
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(t + '-tab').classList.add('active');
        document.getElementById('btn-' + t + (t==='monthly'?'-tab':'')).classList.add('active');
    }

    function generateMonthlyReport() {
        const m = document.getElementById('monthlyBaseMonth').value;
        if(!m) return alert("請選擇月份");
        let grouped = {};
        cloudLogs.filter(l => l.reportMonth === m).forEach(l => {
            if(!grouped[l.reporter]) grouped[l.reporter] = [];
            grouped[l.reporter].push(l);
        });
        let txt = `【${m} 月會報告彙整】\n\n`;
        for(let user in grouped) {
            txt += `👤 負責人：${user}\n`;
            grouped[user].forEach(item => { txt += `  - [${item.reportWeek}] ${item.content}\n`; });
            txt += `\n`;
        }
        document.getElementById('monthlyOutput').value = txt;
    }

    function copyMonthlyReport() {
        document.getElementById('monthlyOutput').select();
        document.execCommand('copy');
        alert("已複製到剪貼簿！");
    }

    function setFilter(f) { currentFilter = f; renderLogs(); }
    function logout() { location.reload(); }
</script>
</body>
</html>
